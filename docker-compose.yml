version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: oil_postgres
    restart: always
    environment:
      POSTGRES_USER: oil_user
      POSTGRES_PASSWORD: oil_password
      POSTGRES_DB: oil_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d

  minio:
    image: minio/minio
    container_name: oil_minio
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: oil_jupyter
    restart: always
    ports:
      - "8888:8888"
    volumes:
      - ./:/home/jovyan/work
    environment:
      JUPYTER_ENABLE_LAB: "yes"

  superset:
    image: apache/superset
    container_name: oil_superset
    restart: always
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: supersecretkey
    depends_on:
      - postgres

volumes:
  postgres_data:
  minio_data: